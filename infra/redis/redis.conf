# =============================================================================
# Session Store (Redis) configuration — REQ-003
# =============================================================================
# Holds active session metadata and the jti/session revocation blocklist the
# CRM API checks on every authenticated request. The password is supplied at
# runtime via --requirepass in docker-compose (never baked into the image).
# =============================================================================

# Bind to all interfaces INSIDE the container only; Redis is never published to
# the host and lives on the private compose network.
bind 0.0.0.0
protected-mode yes
port 6379

# Durability: append-only file so sessions/revocations survive a restart.
appendonly yes
appendfsync everysec

# Memory bound. Sessions must NOT be silently evicted — reject writes instead of
# dropping session/revocation keys under pressure.
maxmemory 256mb
maxmemory-policy noeviction

# Disable the most dangerous commands for the application user.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command KEYS ""
