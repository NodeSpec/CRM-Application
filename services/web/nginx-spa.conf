# Serves the built React SPA. The outer reverse proxy handles /api and /auth;
# this inner nginx only serves static assets with a history-API fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Client-side routing: unknown paths fall back to the SPA entrypoint.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
