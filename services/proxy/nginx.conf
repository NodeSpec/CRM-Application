# =============================================================================
# Reverse Proxy — single external entry point for the CRM stack
# (REQ-014, REQ-016). Serves the React SPA and routes /api/v1 → CRM API and
# /auth → Identity Provider. TLS termination block is provided below, commented
# out until certificates are mounted (see docker-compose volumes).
# =============================================================================

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;                       # hide nginx version (security)

    # gzip static/text responses.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    # Per-IP rate limiting for the API (burst tolerant).
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # Upstreams resolve by compose service name on the shared network.
    upstream crm_api { server api:3000; }
    upstream crm_web { server web:80; }
    upstream crm_idp { server idp:8080; }

    # Cap request body size (tune per upload needs).
    client_max_body_size 10m;

    # --- HTTP server (port 80) ------------------------------------------
    # In production, redirect to HTTPS instead of serving here:
    #   return 301 https://$host$request_uri;
    server {
        listen 80;
        server_name _;

        # Security headers.
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # --- CRM API (versioned) — REQ-016 ---
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://crm_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # --- Identity Provider — REQ-001 ---
        location /auth/ {
            proxy_pass http://crm_idp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- React SPA (everything else) ---
        location / {
            proxy_pass http://crm_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- HTTPS server (port 443) — enable for production -----------------
    # Mount certs at /etc/nginx/certs (see docker-compose) and uncomment.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your.domain.example;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     # ... same location blocks as the port-80 server above ...
    # }
}
